<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style/index.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">

      <div class="header-icon"><i class="bi bi-play-btn"></i></div>

      <div class="header-item">
        <div>Esplora</div>
        <div>Seguiti</div>
        <span class="notification-dot"></span>
        <div class="selected-item">P<span class="underline">er t</span>e</div>
      </div>

      <div class="header-icon"><i class="bi bi-search"></i></div>

    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div>
        <img src="./assets/img/boolean_logo.png" alt="logo-boolean" class="logo">
        <div class="add-dot">+</div>
      </div>
      <div class="sidebar-icon">
        <i class="bi bi-heart-fill"></i>
        <p class="number">588</p>
      </div>
      <div class="sidebar-icon">
        <i class="bi bi-chat-dots-fill"></i>
        <p class="number">13</p>
      </div>
      <div class="sidebar-icon">
        <i class="bi bi-bookmark-fill"></i>  
        <p class="number">638</p>
      </div>
      <div class="sidebar-icon">
        <i class="bi bi-sign-turn-slight-right-fill"></i>
        <p class="number">491</p>
      </div>
    </div>

    <div class="description">
      <h4 class="description-title">boolean.careers</h4>
      <input type="checkbox" id="Vedi altro" class="hidden-checkbox">
      <p class="caption">
        Prova il Fundamentals Camp. Venti ore di corso gratuiti per
        <span class="more-text">imparare a programmare e scoprire se il mondo del software fa per te.</span>
      </p>
      <label for="Vedi altro" class="read-more-button"></label>
    </div>

    <!-- Footer -->
    <footer class="nav-bar">
      <div class="footer-icon">
        <i class="bi bi-house-fill"></i>
        <p class="text">Home</p>
      </div>
      <div class="footer-icon">
        <i class="bi bi-people"></i>
        <p class="text">Amici</p>
      </div>
      <div class="footer-icon">
        <i class="bi bi-file-plus-fill"></i>
      </div>
      <div class="footer-icon">
        <i class="bi bi-chat-square"></i>
        <div class="mex-num">19</div>
        <p class="text">Posta in arrivo</p>
      </div>
      <div class="footer-icon">
        <i class="bi bi-person"></i>
        <p class="text">Profilo</p>
      </div>
    </footer>
  </div>

</body>

</html>
